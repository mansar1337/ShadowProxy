name: Build packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.2.3). Leave empty to use git tag or "dev".'
        required: false
        default: ''
      build_apk:
        description: 'Build APK packages'
        type: boolean
        required: false
        default: true
      build_ipk:
        description: 'Build IPK packages'
        type: boolean
        required: false
        default: true
      create_release:
        description: 'Create GitHub Release and upload artifacts'
        type: boolean
        required: false
        default: false

# ─────────────────────────────────────────────────────────────────────────────
# Shared env
# ─────────────────────────────────────────────────────────────────────────────
env:
  # Docker images (mirror what the local build scripts use)
  APK_SDK_IMAGE: itdoginfo/openwrt-sdk-apk:09102025
  IPK_SDK_IMAGE: itdoginfo/openwrt-sdk-ipk:24.10.3

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# Resolve version string once; shared by both build jobs
# ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      do_apk:  ${{ steps.flags.outputs.do_apk }}
      do_ipk:  ${{ steps.flags.outputs.do_ipk }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Determine build flags
        id: flags
        run: |
          # On tag push → build everything; on manual dispatch → respect checkboxes
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "do_apk=true" >> "$GITHUB_OUTPUT"
            echo "do_ipk=true" >> "$GITHUB_OUTPUT"
          else
            echo "do_apk=${{ github.event.inputs.build_apk }}"  >> "$GITHUB_OUTPUT"
            echo "do_ipk=${{ github.event.inputs.build_ipk }}"  >> "$GITHUB_OUTPUT"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Build fe-app (TypeScript → main.js injected into luci-app-podkop)
# ─────────────────────────────────────────────────────────────────────────────
  build-fe:
    name: Build frontend (fe-app)
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: fe-app-podkop/yarn.lock

      - name: Install dependencies
        working-directory: fe-app-podkop
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: fe-app-podkop
        run: yarn build

      # The build step writes the compiled JS directly into the luci-app tree;
      # upload the whole luci-app-podkop so downstream jobs can consume it.
      - name: Upload luci-app-podkop artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-podkop-built
          path: luci-app-podkop/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Build APK packages (OpenWrt ≥ 24.10 / snapshot with apk-tools)
# ─────────────────────────────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [prepare, build-fe]
    if: needs.prepare.outputs.do_apk == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download compiled luci-app-podkop
        uses: actions/download-artifact@v4
        with:
          name: luci-app-podkop-built
          path: luci-app-podkop/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull SDK image
        run: docker pull "$APK_SDK_IMAGE"

      - name: Build APK packages
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p out-apk
          # Docker container runs as root; grant write access so cp into /out works.
          chmod 777 out-apk

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/out-apk:/out" \
            -e PODKOP_META_VERSION="${VERSION}" \
            -e LUCI_META_VERSION="${VERSION}" \
            -e JOBS="$(nproc)" \
            -e VERBOSE="s" \
            -e COPY_ALL_APK="0" \
            --entrypoint /bin/sh \
            "$APK_SDK_IMAGE" -c '
          set -eu
          cd /builder

          rm -rf /builder/package/feeds/utilities/podkop
          rm -rf /builder/package/feeds/luci/luci-app-podkop
          mkdir -p /builder/package/feeds/utilities
          mkdir -p /builder/package/feeds/luci
          cp -a /workspace/podkop            /builder/package/feeds/utilities/podkop
          cp -a /workspace/luci-app-podkop   /builder/package/feeds/luci/luci-app-podkop

          # Stamp metadata version into Makefiles
          sed -i "s/^SHADOWPROXY_METADATA_VERSION:=.*/SHADOWPROXY_METADATA_VERSION:=${PODKOP_META_VERSION}/" \
              /builder/package/feeds/utilities/podkop/Makefile
          sed -i "s/^SHADOWPROXY_METADATA_VERSION:=.*/SHADOWPROXY_METADATA_VERSION:=${LUCI_META_VERSION}/" \
              /builder/package/feeds/luci/luci-app-podkop/Makefile

          make defconfig
          make package/feeds/utilities/podkop/compile     -j"${JOBS}" V="${VERBOSE}"
          make package/feeds/luci/luci-app-podkop/compile -j"${JOBS}" V="${VERBOSE}"

          TMP_LIST="$(mktemp)"
          find /builder -type f -name "*.apk" > "$TMP_LIST"
          [ -s "$TMP_LIST" ] || { echo "No .apk files found" >&2; exit 2; }

          while IFS= read -r f; do
            name="$(basename "$f")"
            case "$name" in
              shadowproxy-*.apk|luci-app-shadowproxy-*.apk|luci-i18n-podkop-*.apk)
                cp -f "$f" /out/ ;;
            esac
          done < "$TMP_LIST"
          rm -f "$TMP_LIST"
          '

      - name: Verify APK output
        run: |
          COUNT=$(find out-apk -maxdepth 1 -name "*.apk" | wc -l)
          echo "APK files built: $COUNT"
          find out-apk -maxdepth 1 -name "*.apk" | sort
          [ "$COUNT" -gt 0 ] || { echo "No APK artifacts found!" >&2; exit 1; }

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-apk
          path: out-apk/*.apk
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# Build IPK packages (OpenWrt stable ≤ 24.10.x with opkg)
# ─────────────────────────────────────────────────────────────────────────────
  build-ipk:
    name: Build IPK
    runs-on: ubuntu-latest
    needs: [prepare, build-fe]
    if: needs.prepare.outputs.do_ipk == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download compiled luci-app-podkop
        uses: actions/download-artifact@v4
        with:
          name: luci-app-podkop-built
          path: luci-app-podkop/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull SDK image
        run: docker pull "$IPK_SDK_IMAGE"

      - name: Build IPK packages
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p out-ipk
          # Docker container runs as root; grant write access so cp into /out works.
          chmod 777 out-ipk

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/out-ipk:/out" \
            -e PODKOP_VERSION="${VERSION}" \
            -e JOBS="$(nproc)" \
            --entrypoint /bin/sh \
            "$IPK_SDK_IMAGE" -c '
          set -eu
          cd /builder

          rm -rf /builder/package/feeds/utilities/podkop
          rm -rf /builder/package/feeds/luci/luci-app-podkop
          mkdir -p /builder/package/feeds/utilities
          mkdir -p /builder/package/feeds/luci
          cp -a /workspace/podkop            /builder/package/feeds/utilities/podkop
          cp -a /workspace/luci-app-podkop   /builder/package/feeds/luci/luci-app-podkop

          # Stamp version into Makefiles
          sed -i "s/^SHADOWPROXY_METADATA_VERSION:=.*/SHADOWPROXY_METADATA_VERSION:=${PODKOP_VERSION}/" \
              /builder/package/feeds/utilities/podkop/Makefile
          sed -i "s/^SHADOWPROXY_METADATA_VERSION:=.*/SHADOWPROXY_METADATA_VERSION:=${PODKOP_VERSION}/" \
              /builder/package/feeds/luci/luci-app-podkop/Makefile

          make defconfig
          make package/feeds/utilities/podkop/compile     V=s -j"${JOBS}"
          make package/feeds/luci/luci-app-podkop/compile V=s -j"${JOBS}"

          TMP_LIST="$(mktemp)"
          find /builder -type f -name "*.ipk" > "$TMP_LIST"
          [ -s "$TMP_LIST" ] || { echo "No .ipk files found" >&2; exit 2; }

          while IFS= read -r f; do
            name="$(basename "$f")"
            case "$name" in
              shadowproxy_*.ipk|luci-app-shadowproxy_*.ipk|luci-i18n-podkop-*.ipk)
                cp -f "$f" /out/ ;;
            esac
          done < "$TMP_LIST"
          rm -f "$TMP_LIST"
          '

      - name: Verify IPK output
        run: |
          COUNT=$(find out-ipk -maxdepth 1 -name "*.ipk" | wc -l)
          echo "IPK files built: $COUNT"
          find out-ipk -maxdepth 1 -name "*.ipk" | sort
          [ "$COUNT" -gt 0 ] || { echo "No IPK artifacts found!" >&2; exit 1; }

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-ipk
          path: out-ipk/*.ipk
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# Create GitHub Release (only on tag push, or when manually requested)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-apk, build-ipk]
    # Run when both builds succeed (skipped builds count as success).
    # On tag push → always release. On manual dispatch → only if requested.
    if: |
      always() &&
      !failure() && !cancelled() &&
      (
        github.event_name == 'push' ||
        github.event.inputs.create_release == 'true'
      )
    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-apk
          path: release-assets/
        continue-on-error: true   # APK build may have been skipped

      - name: Download IPK artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-ipk
          path: release-assets/
        continue-on-error: true   # IPK build may have been skipped

      - name: List release assets
        run: |
          echo "=== Assets to upload ==="
          find release-assets -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ShadowProxy ${{ needs.prepare.outputs.version }}"
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'dev') }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## ShadowProxy ${{ needs.prepare.outputs.version }}

            ### Installation

            **OpenWrt ≥ 24.10 (apk)**
            ```sh
            apk add --allow-untrusted shadowproxy-*.apk luci-app-shadowproxy-*.apk
            ```

            **OpenWrt ≤ 24.10 (opkg)**
            ```sh
            opkg install shadowproxy_*.ipk luci-app-shadowproxy_*.ipk
            ```

            Or use the one-line installer:
            ```sh
            sh <(wget -O - https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh)
            ```